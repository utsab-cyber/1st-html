<html>
    <head>
        <title>Buzz Number Check</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            
            // Buzz number: last digit is 7 OR divisible by 7
            if ((n % 10 == 7) || (n % 7 == 0)) {
                document.write("<br> " + n + " is a Buzz number");
            } else {
                document.write("<br> " + n + " is not a Buzz number");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
