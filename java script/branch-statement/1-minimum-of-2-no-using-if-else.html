<html>
    <head>
        <title>Minimum of 2 Numbers</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            if (x < y) {
                document.write("<br> The minimum number is = " + x);
            } else {
                document.write("<br> The minimum number is = " + y);
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
