<html>
    <head>
        <title>Factorial using While Loop</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            
            var c = 1;
            while (n > 0) {
                c = c * n;
                n--;
            }
            
            document.write("<br> Factorial is = " + c);
        </script>
    </head>
    <body>
        
    </body>
</html>
