<html>
    <head>
        <title>Divide by 2 Without % Operator</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            // Right shift by 1 is equivalent to dividing by 2
            var y = x >> 1;
            
            document.write("<br> Divided number is " + y);
        </script>
    </head>
    <body>
        
    </body>
</html>
