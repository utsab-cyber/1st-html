<html>
    <head>
        <title>Loop - Odd Iterations</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            
            for (var i = 1; i <= n; i = i + 2) {
                output += "<br> Utsab";
            }
            
            document.write(output);
        </script>
    </head>

    </body>
</html>
