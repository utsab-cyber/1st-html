<html>
    <head>
        <title>Odd or Even using Bitwise</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            // Bitwise AND with 1: if odd result is 1, if even result is 0
            if (x & 1) {
                document.write("<br> Odd");
            } else {
                document.write("<br> Even");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
