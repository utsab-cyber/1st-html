<html>
    <head>
        <title>Sum of Odd Numbers</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var s = 0;
            
            for (var i = 1; i <= n; i = i + 2) {
                s = s + i;
            }
            
            document.write("<br> Sum of odd numbers up to " + n + " = " + s);
        </script>
    </head>

    </body>
</html>
