<html>
    <head>
        <title>Pattern - Binary Alternating</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            var a = 1;
            
            for (var i = 1; i <= n; i++) {
                for (var j = 1; j <= n; j++) {
                    if (a % 2 == 0) {
                        output += "1";
                    } else {
                        output += "0";
                    }
                    a++;
                }
                output += "<br>";
            }
            
            document.write(output);
        </script>
    </head>
    <body>
        
    </body>
</html>
