<html>
    <head>
        <title>Bitwise AND Between 2 Numbers</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            var z = x & y;
            
            document.write("<br> Bitwise AND is = " + z);
        </script>
    </head>

    </body>
</html>
