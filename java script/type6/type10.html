<html>
    <head>
        <title>type6 - type10</title>
        <script>
            // C code converted to JavaScript
            int main()
{
    int i,j,n,a=1;
    printf("\n Enter a n:");
    scanf("%d",&n);
    for (i=1;i<=n;i++)
    {   
        for (j=1;j<=i;j++)
        {
            printf("%c",64+a);
            a++;
        }
      printf("\n");
    }
    for (i=1;i<=n;i++)
    {   
        for (j=1;j<=n-i+1;j++)
        {
            printf("%c",64+a);
            a++;
        }
      printf("\n");  
    }
        </script>
    </head>
    <body>
        
    </body>
</html>
