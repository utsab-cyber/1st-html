<html>
    <head>
        <title>Celsius to Fahrenheit Conversion</title>
        <script>
            var ch = prompt("Enter 1 for Celsius to Fahrenheit\nEnter 2 for Fahrenheit to Celsius");
            var c = 3;
            var ce, f;
            
            ch = parseInt(ch);
            
            if (ch == 1) {
                ce = prompt("Enter Celsius: ");
                ce = parseFloat(ce);
                f = 32 + ce * 9 / 5;
                document.write("<br> In Fahrenheit = " + f.toFixed(2));
            } else if (ch == 2) {
                f = prompt("Enter Fahrenheit: ");
                f = parseFloat(f);
                ce = (f - 32) * 5 / 9;
                document.write("<br> In Celsius = " + ce.toFixed(2));
            } else {
                document.write("<br> Please enter 1 or 2");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
