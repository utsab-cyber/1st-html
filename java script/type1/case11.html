<html>
    <head>
        <title>Multiplication Table Pattern</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            
            for (var i = 1; i <= n; i++) {
                for (var j = 1; j <= n; j++) {
                    output += (i - 1) * j;
                }
                output += "<br>";
            }
            
            document.write(output);
        </script>
    </head>
    <body>
        
    </body>
</html>
