<html>
    <head>
        <title>Check Prime Number</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var flag = 0;
            
            // Check if prime
            for (var i = 2; i < n; i++) {
                if (n % i == 0) {
                    flag = 1;
                    break;
                }
            }
            
            if (flag == 0) {
                document.write("<br> " + n + " is a Prime number");
            } else {
                document.write("<br> " + n + " is not a Prime number");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
