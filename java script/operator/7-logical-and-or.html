<html>
    <head>
        <title>Logical AND and OR Operations</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            var z = x && y;
            document.write("<br> Logical AND (" + x + " && " + y + ") = " + (z ? 1 : 0));
            
            z = x || y;
            document.write("<br> Logical OR (" + x + " || " + y + ") = " + (z ? 1 : 0));
        </script>
    </head>
    <body>
        
    </body>
</html>
