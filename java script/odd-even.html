<html>
    <head>
        <title>Max of 3 no </title>
        <script>
            var y;
            y=Number(prompt("Enter 1st no"));
           
            if(y%2==0)
        {
            document.write("<br> even");
        }
        else
        {
             document.write("<br> odd");
        }
        </script>
    </head>
</html>
