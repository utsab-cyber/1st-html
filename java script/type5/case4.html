        <title>type5 - case4</title>
        <script>
            // C code converted to JavaScript
            int main()
{   
    int i,j,n,a=1;
    printf("\n Enter a no:");
    scanf("%d",&n);
    for (i=1;i<=n;i++)
    {    
        a=i;
        for (j=1;j<=n-i;j++)
        {
            printf(" ");
        }
        for (j=1;j<=i;j++)
        {
            printf("%d",a);
            a++;
        }
      printf("\n");
    }
        </script>
