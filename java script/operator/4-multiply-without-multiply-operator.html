<html>
    <head>
        <title>Multiply Without Multiply Operator</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            // Left shift by 1 is equivalent to multiplying by 2
            var y = x << 1;
            
            document.write("<br> Multiplied number is " + y);
        </script>
    </head>
    <body>
        
    </body>
</html>
