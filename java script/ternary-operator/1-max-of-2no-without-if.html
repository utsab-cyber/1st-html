<html>
    <head>
        <title>Maximum of 2 Numbers using Ternary</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            var z = x > y ? x : y;
            
            document.write("<br> z = " + z + " is maximum");
        </script>
    </head>
    <body>
        
    </body>
</html>
