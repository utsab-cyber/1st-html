<html>
    <head>
        <title>Odd or Even</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            if (x % 2 == 0) {
                document.write("<br> Even");
            } else {
                document.write("<br> Odd");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
