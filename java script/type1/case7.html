<html>
    <head>
        <title>Pattern - Characters by Column</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            
            for (var i = 1; i <= n; i++) {
                for (var j = 1; j <= n; j++) {
                    // ASCII 65 is 'A', 64+j gives the column character
                    output += String.fromCharCode(64 + j);
                }
                output += "<br>";
            }
            
            document.write(output);
        </script>
    </head>
    <body>
        
    </body>
</html>
