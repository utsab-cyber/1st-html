<html>
    <head>
        <title>Logical NOT Operator</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            var z = !x;  // Logical NOT
            document.write("<br> Logical NOT (!) of " + x + " is = " + (z ? 1 : 0));
            
            z = !!x;  // Double Logical NOT
            document.write("<br> Double Logical NOT (!!) of " + x + " is = " + (z ? 1 : 0));
        </script>
    </head>
    <body>
        
    </body>
</html>
