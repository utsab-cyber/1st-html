<html>
    <head>
        <title>Swapping of 2 Numbers</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            document.write("<br> Before: x = " + x + " and y = " + y);
            
            // Swapping using temporary variable
            var z = x;
            x = y;
            y = z;
            
            document.write("<br> After: x = " + x + " and y = " + y);
        </script>
    </head>
    <body>
        
    </body>
</html>
