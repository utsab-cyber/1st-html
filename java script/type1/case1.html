<html>
    <head>
        <title>Struct with Pointer - Input and Display</title>
        <script>
            // Struct equivalent in JavaScript
            var name = {
                a: 0,
                b: 0.0
            };
            
            var a = prompt("Enter integer value (a): ");
            var b = prompt("Enter float value (b): ");
            
            name.a = parseInt(a);
            name.b = parseFloat(b);
            
            document.write("<br> a = " + name.a);
            document.write("<br> b = " + name.b);
        </script>
    </head>
    <body>
        
    </body>
</html>
