<html>
    <head>
        <title> Arethmetic operetor </title>
        <script>
            var x,y,z,s,m,d,mo,p;
            x=Number(prompt("Enter a no: "));
            y=Number(prompt("Enter a no: "));
            z=x+y;
            document.write("<br> Sum ="+z);
            s=x-y;
            document.write("<br> Sub ="+s  );
            m=x*y;
            document.write("<br> Mul ="+m);
            d=x/y;
            document.write("<br> Division ="+d);
            mo=x%y;
            document.write("<br> mod ="+mo);
            p=x**y;
            document.write("<br> x<sup> y</sup> ="+p);

        </script>
    </head>
</html>
