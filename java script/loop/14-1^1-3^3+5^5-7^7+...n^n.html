<html>
    <head>
        <title>Series: 1¹ - 3³ + 5⁵ - 7⁷ + ... (odd numbers)</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var s = 0;
            
            for (var i = 1; i <= n; i = i + 2) {
                var z = Math.pow(-1, i - 1);  // Alternates between 1 and -1
                s = s + Math.pow(i, i) * z;
            }
            
            document.write("<br> Sum = " + s);
        </script>
    </head>
    <body>
        
    </body>
</html>
