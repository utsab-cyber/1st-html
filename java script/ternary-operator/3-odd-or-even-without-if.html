<html>
    <head>
        <title>Odd or Even using Ternary</title>
        <script>
            var x = prompt("Enter a number: ");
            x = parseInt(x);
            
            var result = x % 2 == 0 ? "Even" : "Odd";
            
            document.write("<br> " + result);
        </script>
    </head>

    </body>
</html>
