<html>
    <head>
        <title>type6 - case1</title>
        <script>
            // C code converted to JavaScript
            int main()
{
    int i,j,n;
    printf("\n Enter a n:");
    scanf("%d",&n);
    for (i=1;i<=n;i++)
    {
        for (j=1;j<=i;j++)
        {
            printf("%4d",j);
        }
      printf("\n");
    }
    for (i=1;i<=n;i++)
    {
        for (j=1;j<=n-i+1;j++)
        {
            printf("%4d",j);
        }
      printf("\n");  
    }
        </script>
