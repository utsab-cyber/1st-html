<html>
    <head>
        <title>Loop Without Increment/Decrement</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            
            for (var i = 1; i <= n;) {
                output += "<br> Utsab";
                i = i + 2;
            }
            
            document.write(output);
        </script>
    </head>

    </body>
</html>
