<html>
    <head>
        <title>Series: 0 - 2 + 4 - 6 + 8 - 10 + ...</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var s = 0;
            var z = 0;
            
            for (var i = 1; i <= n; i++) {
                if (i % 2 == 0) {
                    s = s - z;
                } else {
                    s = s + z;
                }
                z = z + 2;
            }
            
            document.write("<br> Sum = " + s);
        </script>
    </head>
    <body>
        
    </body>
</html>
