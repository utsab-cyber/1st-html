<html>
    <head>
        <title>Loop Without Initialization</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            var i = 1;
            
            for (; i <= n;) {
                output += "<br> Utsab";
                i = i + 2;
            }
            
            document.write(output);
        </script>
    </head>
    <body>
        
    </body>
</html>
