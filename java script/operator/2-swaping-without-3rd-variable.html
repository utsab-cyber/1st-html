<html>
    <head>
        <title>Swapping Without 3rd Variable</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            
            document.write("<br> Before: x = " + x + " and y = " + y);
            
            // Method 1: Using multiplication and division
            x = x * y;   
            y = x / y;  
            x = x / y;
            
            document.write("<br> After: x = " + x + " and y = " + y);
        </script>
    </head>
    <body>
        
    </body>
</html>
