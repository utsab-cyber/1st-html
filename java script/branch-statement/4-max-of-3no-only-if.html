<html>
    <head>
        <title>Maximum of 3 Numbers</title>
        <script>
            var x = prompt("Enter 1st number: ");
            var y = prompt("Enter 2nd number: ");
            var z = prompt("Enter 3rd number: ");
            
            x = parseInt(x);
            y = parseInt(y);
            z = parseInt(z);
            
            if ((x > y) && (x > z)) {
                document.write("<br> x = " + x + " is maximum");
            }
            if ((y > x) && (y > z)) {
                document.write("<br> y = " + y + " is maximum");
            }
            if ((z > y) && (z > x)) {
                document.write("<br> z = " + z + " is maximum");
            }
        </script>
    </head>
    <body>
        
    </body>
</html>
