<html>
    <head>
        <title>Series: 1 - 2 + 3 - 4 + ... n</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var s = 0;
            
            for (var i = 1; i <= n; i++) {
                var z = Math.pow(-1, i - 1);  // Alternates between 1 and -1
                s = s + i * z;
            }
            
            document.write("<br> Sum = " + s);
        </script>
    </head>
    <body>
        
    </body>
</html>
