<html>
    <head>
        <title>Reverse a Number</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            
            var y = 0;
            while (n > 0) {
                var r = n % 10;
                y = y * 10 + r;
                n = Math.floor(n / 10);
            }
            
            document.write("<br> Reverse number is = " + y);
        </script>
    </head>
    <body>
        
    </body>
</html>
