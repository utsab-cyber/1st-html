<html>
    <head>
        <title>Pattern - Incrementing Numbers</title>
        <script>
            var n = prompt("Enter a number: ");
            n = parseInt(n);
            var output = "";
            
            for (var i = 1; i <= n; i++) {
                var a = i;
                for (var j = 1; j <= n; j++) {
                    output += a;
                    a++;
                }
                output += "<br>";
            }
            
            document.write(output);
        </script>
    </head>
    <body>
        
    </body>
</html>
